<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Not Found — Surface Intelligence</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/site.css">
  <style>
    .error-page {
      min-height: 70vh;
      display: flex;
      align-items: center;
      padding: 80px 0;
    }
    .error-code {
      font: 700 clamp(80px, 14vw, 140px)/1 'JetBrains Mono', monospace;
      color: var(--yellow);
      opacity: 0.2;
      display: block;
      margin-bottom: 0;
      letter-spacing: -0.04em;
    }
    .error-page h1 {
      font-size: clamp(32px, 4.5vw, 52px);
      margin: 0 0 16px;
      line-height: 1.05;
    }
    .error-page p {
      max-width: 480px;
      margin: 0 0 32px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.6;
    }
    .error-links {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      max-width: 560px;
      margin-top: 32px;
      padding-top: 28px;
      border-top: 1px solid var(--border);
    }
    .error-link {
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      text-decoration: none;
      font-size: 14px;
      color: var(--muted);
      transition: border-color 150ms, color 150ms;
    }
    .error-link:hover {
      border-color: var(--yellow);
      color: var(--yellow);
    }
    @media (max-width: 600px) {
      .error-links { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<script src="/assets/nav.js?v=nav-cleanup-20260605"></script>
<main id="main-content">
  <div class="wrap error-page">
    <div>
      <span class="error-code">404</span>
      <div class="eyebrow" style="margin-top: 16px;">// Page not found</div>
      <h1 class="display">We couldn't find that page.</h1>
      <p>The page you're looking for doesn't exist or may have been moved. Try one of the links below to get back on track.</p>
      <div class="actions">
        <a class="btn" href="/">Back to home</a>
        <a class="btn ghost" href="/tools/">Browse free tools</a>
      </div>
      <nav class="error-links" aria-label="Site sections">
        <a class="error-link" href="/">Home</a>
        <a class="error-link" href="/tools/">Free Tools</a>
        <a class="error-link" href="/articles/">Pavement Insights</a>
      </nav>
    </div>
  </div>
</main>
</body>
</html>
